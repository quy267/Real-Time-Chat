services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ..:/app
      - uploads:/app/uploads
    env_file:
      - ../.env
    environment:
      - CHAT_DATABASE_URL=postgresql+asyncpg://chat:chat@db:5432/chat
      - CHAT_REDIS_URL=redis://redis:6379/0
      - CHAT_CELERY_BROKER_URL=redis://redis:6379/1
      - CHAT_CELERY_RESULT_BACKEND=redis://redis:6379/2
      - CHAT_DEBUG=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
      POSTGRES_DB: chat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A src.infrastructure.celery_app:celery_app worker --loglevel=info
    volumes:
      - ..:/app
    environment:
      - CHAT_DATABASE_URL=postgresql+asyncpg://chat:chat@db:5432/chat
      - CHAT_REDIS_URL=redis://redis:6379/0
      - CHAT_CELERY_BROKER_URL=redis://redis:6379/1
      - CHAT_CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
